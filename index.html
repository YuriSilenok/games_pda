<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Морской бой">
  <meta name="description" content="Шестигранный морской бой - PWA игра">
  <link rel="manifest" id="manifest">
  <title>Шестигранный морской бой</title>
  
  <script>
    const manifest = {
      name: "Шестигранный морской бой",
      short_name: "Морской бой",
      description: "Стратегическая игра на шестигранном поле",
      start_url: location.href,
      display: "standalone",
      orientation: "any",
      background_color: "#0d1b2a",
      theme_color: "#0d1b2a",
      icons: [
        {
          src: "data:image/svg+xml," + encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
              <rect width="192" height="192" rx="32" fill="#0d1b2a"/>
              <polygon points="96,16 160,48 160,112 96,144 32,112 32,48" fill="none" stroke="#d4a853" stroke-width="6"/>
              <polygon points="96,48 136,68 136,100 96,120 56,100 56,68" fill="#4a7c59" opacity="0.8"/>
              <circle cx="96" cy="84" r="16" fill="#c0392b"/>
              <line x1="84" y1="72" x2="108" y2="96" stroke="#ffd700" stroke-width="3"/>
              <line x1="108" y1="72" x2="84" y2="96" stroke="#ffd700" stroke-width="3"/>
            </svg>
          `),
          sizes: "192x192",
          type: "image/svg+xml",
          purpose: "any maskable"
        }
      ]
    };
    
    const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    document.getElementById('manifest').href = URL.createObjectURL(manifestBlob);
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      touch-action: manipulation;
      background: #0d1b2a;
    }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: 10px;
    }

    .game-container {
      background: rgba(20, 30, 45, 0.85);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 600px;
    }

    h1 {
      color: #e6c88a;
      font-size: clamp(1rem, 4vw, 1.5rem);
      letter-spacing: 2px;
      font-weight: 500;
      text-align: center;
    }

    .board-area {
      position: relative;
      width: 100%;
      max-width: 500px;
      aspect-ratio: 1 / 1;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 15px;
      background: #0a1620;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    #enemyCanvas {
      z-index: 2;
      cursor: crosshair;
    }

    #playerCanvas {
      z-index: 1;
    }

    .view-enemy #enemyCanvas {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .view-enemy #playerCanvas {
      opacity: 0;
      transform: scale(0.95);
      pointer-events: none;
    }

    .view-player #enemyCanvas {
      opacity: 0;
      transform: scale(0.95);
      pointer-events: none;
    }

    .view-player #playerCanvas {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .toggle-buttons {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 500px;
    }

    .toggle-btn {
      flex: 1;
      padding: 10px;
      border-radius: 25px;
      border: 2px solid #d4a853;
      background: rgba(26, 42, 58, 0.8);
      color: #c0d0e0;
      font-weight: bold;
      font-size: clamp(0.75rem, 2.5vw, 0.9rem);
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      touch-action: manipulation;
    }

    .toggle-btn.active {
      background: #d4a853;
      color: #0d1f2d;
      border-color: #e6c88a;
      box-shadow: 0 0 15px rgba(212, 168, 83, 0.5);
    }

    .stats-panel {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 15px;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      width: 100%;
      max-width: 500px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #cddcec;
      font-size: clamp(0.6rem, 2vw, 0.8rem);
      font-weight: bold;
    }

    .counter {
      color: #ffd700;
      font-weight: bold;
      min-width: 30px;
      text-align: center;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 500px;
    }

    button {
      background: linear-gradient(180deg, #e8bc6e 0%, #c48a35 100%);
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      font-weight: bold;
      font-size: clamp(0.75rem, 2.5vw, 0.9rem);
      letter-spacing: 1px;
      color: #0d1f2d;
      box-shadow: 0 5px 0 #6b4518, 0 5px 12px black;
      cursor: pointer;
      transition: all 0.08s ease;
      text-transform: uppercase;
      touch-action: manipulation;
      flex: 1;
      min-width: 120px;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #6b4518, 0 3px 8px black;
    }

    .message-area {
      font-size: clamp(0.7rem, 2.5vw, 0.9rem);
      font-weight: bold;
      color: #ffe9b0;
      background: #0d1a26;
      padding: 8px 12px;
      border-radius: 20px;
      text-align: center;
      box-shadow: inset 0 2px 8px #00000070;
      flex: 2;
    }

    .install-prompt {
      display: none;
      background: #2c3e50;
      color: #ffd700;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid #d4a853;
      width: 100%;
      text-align: center;
    }

    @media (max-width: 400px) {
      .game-container {
        padding: 8px;
        gap: 6px;
      }
      .toggle-btn {
        padding: 8px;
        font-size: 0.7rem;
      }
      button {
        padding: 8px 12px;
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>
<div class="game-container view-enemy" id="gameContainer">
  <h1>⚓ ШЕСТИГРАННЫЙ БОЙ ⚓</h1>

  <div class="board-area">
    <canvas id="playerCanvas"></canvas>
    <canvas id="enemyCanvas"></canvas>
  </div>

  <div class="toggle-buttons">
    <button class="toggle-btn active" id="btnEnemy">🎯 Поле противника</button>
    <button class="toggle-btn" id="btnPlayer">🚢 Моё поле</button>
  </div>

  <div class="stats-panel" id="enemyStats"></div>

  <div class="controls">
    <button id="resetButton">🔄 Новая игра</button>
    <div class="message-area" id="statusMessage">Загрузка...</div>
  </div>
  
  <button class="install-prompt" id="installButton">📱 Установить приложение</button>
</div>

<script>
  (function() {
    // ---------- PWA SERVICE WORKER ----------
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE_NAME = 'hex-battle-v5';
        self.addEventListener('install', e => {
          e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(['/'])).then(() => self.skipWaiting()));
        });
        self.addEventListener('activate', e => {
          e.waitUntil(caches.keys().then(keys => Promise.all(keys.map(k => k !== CACHE_NAME ? caches.delete(k) : null))).then(() => self.clients.claim()));
        });
        self.addEventListener('fetch', e => {
          e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
        });
      `;
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
    }

    // ---------- УСТАНОВКА PWA ----------
    let deferredPrompt;
    const installButton = document.getElementById('installButton');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installButton.style.display = 'block';
    });
    installButton.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        installButton.style.display = 'none';
      }
    });
    window.addEventListener('appinstalled', () => {
      installButton.style.display = 'none';
    });

    // ---------- ПАРАМЕТРЫ ----------
    const ROWS = 20;
    const COLS = 20;
    const SHIPS = [
      { size: 5, count: 1 },
      { size: 4, count: 2 },
      { size: 3, count: 3 },
      { size: 2, count: 4 },
      { size: 1, count: 5 }
    ];

    // ---------- СОСТОЯНИЕ ----------
    let playerBoard = [], enemyBoard = [];
    let playerShips = [], enemyShips = [];
    let gameOver = false, playerTurn = true, gameStarted = false;
    let currentView = 'enemy'; // 'enemy' или 'player'
    let canvasSize = 500, hexRadius = 20, hexHeight = 40, hexWidth = 34.64;

    const gameContainer = document.getElementById('gameContainer');
    const statusDiv = document.getElementById('statusMessage');
    const enemyStatsDiv = document.getElementById('enemyStats');
    const playerCanvas = document.getElementById('playerCanvas');
    const enemyCanvas = document.getElementById('enemyCanvas');
    const ctxPlayer = playerCanvas.getContext('2d');
    const ctxEnemy = enemyCanvas.getContext('2d');
    const btnEnemy = document.getElementById('btnEnemy');
    const btnPlayer = document.getElementById('btnPlayer');

    // ---------- РАЗМЕРЫ ----------
    function updateSizes() {
      const boardArea = document.querySelector('.board-area');
      const rect = boardArea.getBoundingClientRect();
      canvasSize = Math.floor(Math.min(rect.width, rect.height));
      if (canvasSize < 250) canvasSize = 250;
      
      const padding = canvasSize * 0.05;
      const availableW = canvasSize - 2 * padding;
      const availableH = canvasSize - 2 * padding;
      
      const wf = COLS * Math.sqrt(3) + Math.sqrt(3) / 2;
      const hf = 1.5 * (ROWS - 1) + 2;
      
      hexRadius = Math.floor(Math.min(availableW / wf, availableH / hf) * 0.92);
      hexHeight = 2 * hexRadius;
      hexWidth = Math.sqrt(3) * hexRadius;
      
      [playerCanvas, enemyCanvas].forEach(c => {
        c.width = canvasSize;
        c.height = canvasSize;
      });
    }

    // ---------- КООРДИНАТЫ ----------
    function hexCenter(row, col) {
      const gridW = (COLS - 1) * hexWidth + hexWidth;
      const gridH = (ROWS - 1) * (hexHeight * 0.75) + hexHeight;
      const ox = (canvasSize - gridW) / 2 + hexWidth / 2;
      const oy = (canvasSize - gridH) / 2 + hexRadius;
      return {
        x: ox + col * hexWidth + (row % 2) * (hexWidth / 2),
        y: oy + row * (hexHeight * 0.75)
      };
    }

    function getHexNeighbors(row, col) {
      const dirs = row % 2 === 1 
        ? [{dr:0,dc:1},{dr:1,dc:0},{dr:1,dc:-1},{dr:0,dc:-1},{dr:-1,dc:-1},{dr:-1,dc:0}]
        : [{dr:0,dc:1},{dr:1,dc:1},{dr:1,dc:0},{dr:0,dc:-1},{dr:-1,dc:0},{dr:-1,dc:1}];
      return dirs.map(d => ({r: row+d.dr, c: col+d.dc}))
        .filter(p => p.r >= 0 && p.r < ROWS && p.c >= 0 && p.c < COLS);
    }

    // ---------- ДОСКА ----------
    function createEmptyBoard() {
      return Array(ROWS).fill().map(() => Array(COLS).fill().map(() => ({ shipId: null, hit: false })));
    }

    // ---------- ПРЯМЫЕ КОРАБЛИ ----------
    function getLineCells(r, c, dir, size) {
      const cells = [];
      let cr = r, cc = c;
      for (let s = 0; s < size; s++) {
        if (cr < 0 || cr >= ROWS || cc < 0 || cc >= COLS) return null;
        cells.push({ r: cr, c: cc });
        if (s < size - 1) {
          const p = cr % 2;
          if (dir === 0) { cc += 1; }
          else if (dir === 1) { cr += 1; if (p === 0) cc -= 1; }
          else { cr += 1; if (p === 1) cc += 1; }
        }
      }
      return cells;
    }

    function canPlace(board, cells) {
      if (!cells) return false;
      for (let c of cells) if (board[c.r][c.c].shipId !== null) return false;
      for (let c of cells) {
        for (let n of getHexNeighbors(c.r, c.c)) {
          if (board[n.r][n.c].shipId !== null && !cells.some(x => x.r === n.r && x.c === n.c)) return false;
        }
      }
      return true;
    }

    function generateShips() {
      const board = createEmptyBoard();
      const ships = [];
      const list = [];
      SHIPS.forEach(s => { for (let i = 0; i < s.count; i++) list.push(s.size); });
      list.sort((a, b) => b - a);

      for (let size of list) {
        let placed = false;
        for (let att = 0; att < 5000 && !placed; att++) {
          const r = Math.floor(Math.random() * ROWS);
          const c = Math.floor(Math.random() * COLS);
          const dir = Math.floor(Math.random() * 3);
          const cells = getLineCells(r, c, dir, size);
          if (canPlace(board, cells)) {
            const id = ships.length;
            cells.forEach(cell => { board[cell.r][cell.c].shipId = id; });
            ships.push({ id, size, cells, hits: 0 });
            placed = true;
          }
        }
        if (!placed) return generateShips();
      }
      return { board, ships };
    }

    // ---------- ПЕРЕКЛЮЧЕНИЕ ВИДА ----------
    function switchView(view) {
      currentView = view;
      gameContainer.className = 'game-container view-' + view;
      btnEnemy.className = 'toggle-btn' + (view === 'enemy' ? ' active' : '');
      btnPlayer.className = 'toggle-btn' + (view === 'player' ? ' active' : '');
      
      if (view === 'player') {
        statusDiv.textContent = '🔍 Просмотр своего поля';
      } else if (gameStarted && !gameOver && playerTurn) {
        statusDiv.textContent = 'Ваш ход. Стреляйте по врагу!';
      }
    }

    // ---------- СТАТИСТИКА ----------
    function updateStats() {
      const stats = {};
      SHIPS.forEach(s => { stats[s.size] = { total: s.count, sunk: 0 }; });
      enemyShips.forEach(ship => {
        if (ship.hits >= ship.size && stats[ship.size]) stats[ship.size].sunk++;
      });
      
      let html = '';
      Object.keys(stats).sort((a,b) => b-a).forEach(size => {
        const d = stats[size];
        const rem = d.total - d.sunk;
        html += `<div class="stat-item"><span>${size}-пал:</span><span class="counter" style="color:${rem===0?'#e74c3c':'#ffd700'}">${rem}/${d.total}</span></div>`;
      });
      enemyStatsDiv.innerHTML = html;
    }

    // ---------- ИГРОВЫЕ ДЕЙСТВИЯ ----------
    function checkSunk(ships, board) {
      for (let ship of ships) {
        if (ship.hits >= ship.size) continue;
        if (ship.cells.every(c => board[c.r][c.c].hit)) {
          ship.hits = ship.size;
          return ship;
        }
      }
      return null;
    }

    function fleetDestroyed(ships) {
      return ships.every(s => s.hits >= s.size);
    }

    function playerFire(row, col) {
      if (!gameStarted || gameOver || !playerTurn || currentView !== 'enemy') return false;
      if (enemyBoard[row][col].hit) {
        statusDiv.textContent = '⚠️ Сюда уже стреляли!';
        return false;
      }

      enemyBoard[row][col].hit = true;
      let hit = false;
      const sid = enemyBoard[row][col].shipId;
      if (sid !== null) {
        hit = true;
        const ship = enemyShips.find(s => s.id === sid);
        if (ship) ship.hits++;
      }

      const sunk = checkSunk(enemyShips, enemyBoard);
      updateStats();
      
      if (sunk) {
        statusDiv.textContent = `⚡ Потоплен ${sunk.size}-палубный! Осталось: ${enemyShips.filter(s=>s.hits<s.size).length} кораблей.`;
      } else if (hit) {
        statusDiv.textContent = '🎯 Попадание! Ходите ещё раз.';
      } else {
        statusDiv.textContent = '💧 Мимо. Ход противника.';
      }

      drawBoth();

      if (fleetDestroyed(enemyShips)) {
        gameOver = true; gameStarted = false;
        statusDiv.textContent = '🏆 ВЫ ПОБЕДИЛИ!';
        drawBoth();
        return true;
      }

      if (!hit) {
        playerTurn = false;
        setTimeout(enemyMove, 600);
      }
      return true;
    }

    function enemyMove() {
      if (gameOver || playerTurn || !gameStarted) return;
      
      const available = [];
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (!playerBoard[r][c].hit) available.push({r,c});
      
      if (available.length === 0) return;
      
      const {r, c} = available[Math.floor(Math.random() * available.length)];
      playerBoard[r][c].hit = true;
      
      let hit = false;
      const sid = playerBoard[r][c].shipId;
      if (sid !== null) {
        hit = true;
        const ship = playerShips.find(s => s.id === sid);
        if (ship) ship.hits++;
      }
      
      const sunk = checkSunk(playerShips, playerBoard);
      if (sunk) {
        statusDiv.textContent = `💥 Противник потопил ваш ${sunk.size}-палубный!`;
      } else if (hit) {
        statusDiv.textContent = '😖 Противник попал! Стреляет снова.';
      } else {
        statusDiv.textContent = '🌊 Противник промахнулся. Ваш ход.';
        if (currentView === 'player') switchView('enemy');
      }
      
      drawBoth();
      
      if (fleetDestroyed(playerShips)) {
        gameOver = true; gameStarted = false;
        statusDiv.textContent = '💀 ВЫ ПРОИГРАЛИ.';
        drawBoth();
        return;
      }
      
      if (!hit) {
        playerTurn = true;
      } else {
        setTimeout(enemyMove, 500);
      }
    }

    // ---------- РИСОВАНИЕ ----------
    function drawBoard(ctx, board, ships, showShips) {
      ctx.clearRect(0, 0, canvasSize, canvasSize);
      ctx.fillStyle = '#0a1620';
      ctx.fillRect(0, 0, canvasSize, canvasSize);

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const {x, y} = hexCenter(r, c);
          const cell = board[r][c];
          let color = '#1a3550';
          
          if (cell.hit) {
            color = cell.shipId !== null ? '#c0392b' : '#3a6080';
          } else if (showShips && cell.shipId !== null) {
            color = '#4a7c59';
          }
          
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = Math.PI/6 + i * Math.PI/3;
            const hx = x + hexRadius * Math.cos(a);
            const hy = y + hexRadius * Math.sin(a);
            i === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
          }
          ctx.closePath();
          ctx.fillStyle = color;
          ctx.fill();
          ctx.strokeStyle = '#8b7d5c';
          ctx.lineWidth = 0.6;
          ctx.stroke();

          if (cell.hit && cell.shipId !== null) {
            const ship = ships.find(s => s.id === cell.shipId);
            if (ship && ship.hits >= ship.size) {
              ctx.strokeStyle = '#ffd700';
              ctx.lineWidth = 1.5;
              const s = hexRadius * 0.35;
              ctx.beginPath();
              ctx.moveTo(x-s, y-s); ctx.lineTo(x+s, y+s);
              ctx.moveTo(x+s, y-s); ctx.lineTo(x-s, y+s);
              ctx.stroke();
            }
          }
          
          if (cell.hit && cell.shipId === null) {
            ctx.beginPath();
            ctx.arc(x, y, hexRadius * 0.12, 0, Math.PI*2);
            ctx.fillStyle = '#d0d0d0';
            ctx.fill();
          }
        }
      }
    }

    function drawBoth() {
      drawBoard(ctxPlayer, playerBoard, playerShips, true);
      drawBoard(ctxEnemy, enemyBoard, enemyShips, false);
    }

    // ---------- ОБРАБОТКА КАСАНИЙ/КЛИКОВ ----------
    function getHexFromEvent(e) {
      const canvas = currentView === 'enemy' ? enemyCanvas : playerCanvas;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvasSize / rect.width;
      const scaleY = canvasSize / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const mx = (clientX - rect.left) * scaleX;
      const my = (clientY - rect.top) * scaleY;

      let best = { row: -1, col: -1, dist: Infinity };
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const {x, y} = hexCenter(r, c);
          const d = Math.hypot(mx - x, my - y);
          if (d < best.dist && d < hexRadius * 0.8) {
            best = { row: r, col: c, dist: d };
          }
        }
      }
      return { row: best.row, col: best.col };
    }

    function handleCanvasTap(e) {
      e.preventDefault();
      
      if (currentView === 'enemy') {
        if (!gameStarted || gameOver || !playerTurn) {
          statusDiv.textContent = gameOver ? 'Игра завершена.' : 'Сейчас не ваш ход.';
          return;
        }
        const {row, col} = getHexFromEvent(e);
        if (row >= 0 && col >= 0) playerFire(row, col);
      } else {
        // В режиме просмотра своего поля показываем информацию
        const {row, col} = getHexFromEvent(e);
        if (row >= 0 && col >= 0) {
          const cell = playerBoard[row][col];
          if (cell.shipId !== null) {
            const ship = playerShips.find(s => s.id === cell.shipId);
            const status = ship.hits >= ship.size ? 'потоплен' : 
                          cell.hit ? 'подбит' : 'цел';
            statusDiv.textContent = `🚢 ${ship.size}-палубный корабль (${status})`;
          } else if (cell.hit) {
            statusDiv.textContent = '💧 Пустая клетка (промах противника)';
          } else {
            statusDiv.textContent = '🌊 Пустая клетка';
          }
        }
      }
    }

    function handleCanvasSwipe(e) {
      // Свайп влево/вправо для переключения полей
      if (!e.touches || e.touches.length === 0) return;
      const touch = e.touches[0];
      if (!this._swipeStart) {
        this._swipeStart = { x: touch.clientX, y: touch.clientY, time: Date.now() };
        return;
      }
      
      const dx = touch.clientX - this._swipeStart.x;
      const dy = touch.clientY - this._swipeStart.y;
      const dt = Date.now() - this._swipeStart.time;
      
      if (dt < 500 && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && currentView === 'player') {
          switchView('enemy');
        } else if (dx < 0 && currentView === 'enemy') {
          switchView('player');
        }
        this._swipeStart = null;
      }
    }

    // ---------- СОБЫТИЯ ----------
    enemyCanvas.addEventListener('click', handleCanvasTap);
    enemyCanvas.addEventListener('touchend', (e) => {
      handleCanvasTap(e);
      enemyCanvas._swipeStart = null;
    });
    enemyCanvas.addEventListener('touchstart', (e) => {
      enemyCanvas._swipeStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, time: Date.now() };
    });
    enemyCanvas.addEventListener('touchmove', (e) => {
      handleCanvasSwipe.call(enemyCanvas, e);
    });

    playerCanvas.addEventListener('click', handleCanvasTap);
    playerCanvas.addEventListener('touchend', (e) => {
      handleCanvasTap(e);
      playerCanvas._swipeStart = null;
    });
    playerCanvas.addEventListener('touchstart', (e) => {
      playerCanvas._swipeStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, time: Date.now() };
    });
    playerCanvas.addEventListener('touchmove', (e) => {
      handleCanvasSwipe.call(playerCanvas, e);
    });

    btnEnemy.addEventListener('click', () => switchView('enemy'));
    btnEnemy.addEventListener('touchend', (e) => { e.preventDefault(); switchView('enemy'); });
    btnPlayer.addEventListener('click', () => switchView('player'));
    btnPlayer.addEventListener('touchend', (e) => { e.preventDefault(); switchView('player'); });

    document.getElementById('resetButton').addEventListener('click', resetGame);
    document.getElementById('resetButton').addEventListener('touchend', (e) => {
      e.preventDefault();
      resetGame();
    });

    // ---------- СБРОС ----------
    function resetGame() {
      statusDiv.textContent = 'Генерация...';
      updateSizes();
      
      setTimeout(() => {
        const pd = generateShips();
        playerBoard = pd.board; playerShips = pd.ships;
        const ed = generateShips();
        enemyBoard = ed.board; enemyShips = ed.ships;
        
        gameOver = false; playerTurn = true; gameStarted = true;
        switchView('enemy');
        statusDiv.textContent = 'Ваш ход. Стреляйте по врагу!';
        updateStats();
        drawBoth();
      }, 100);
    }

    // ---------- РЕСАЙЗ ----------
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        updateSizes();
        drawBoth();
      }, 300);
    });

    // ---------- ЗАПУСК ----------
    updateSizes();
    resetGame();
  })();
</script>
</body>
</html>
